<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Animation</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas" width="800" height="800"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        // CHANGE THIS TO YOUR INITIALS (ex: "J", "A+M", "LOVE")
        const YOUR_INITIALS = "A+M";
        
        let time = 0;

        function corazon(n) {
            const x = 16 * Math.pow(Math.sin(n), 3);
            const y = 13 * Math.cos(n) - 5 * Math.cos(2*n) - 2 * Math.cos(3*n) - Math.cos(4*n);
            return { x, y };
        }

        function getHeartPoints(scale, offsetX, offsetY) {
            const points = [];
            for (let n = 0; n <= 100; n += 2) {
                const angle = n / 10;
                const { x, y } = corazon(angle);
                points.push({
                    x: offsetX + x * scale,
                    y: offsetY - y * scale
                });
            }
            return points;
        }

        function drawHeart(points, color, lineWidth) {
            if (points.length < 2) return;
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.stroke();
        }

        function drawInitials(initials, scale, centerX, centerY, waveX, waveY) {
            const heartCenterY = centerY - scale * 2;
            ctx.font = `bold ${Math.floor(scale * 2.5)}px "Arial"`;
            ctx.fillStyle = `rgba(255, 200, 200, 0.95)`;
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'red';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(initials, centerX + waveX * 0.3, heartCenterY + waveY * 0.3);
            ctx.shadowBlur = 0;
        }

        let hearts = [];

        function updateHearts() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            hearts = [];
            
            for (let i = 1; i <= 15; i++) {
                const scale = i * 0.7;
                const waveX = Math.sin(time + i * 0.3) * 2;
                const waveY = Math.cos(time * 0.7 + i * 0.2) * 2;
                const points = getHeartPoints(scale, centerX + waveX, centerY + waveY);
                const intensity = 100 + Math.floor((i / 15) * 155);
                const color = `rgb(255, ${Math.floor(intensity/3)}, ${Math.floor(intensity/3)})`;
                
                hearts.push({
                    points: points,
                    color: color,
                    scale: scale,
                    waveX: waveX,
                    waveY: waveY
                });
            }
        }

        function animate() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            time += 0.03;
            updateHearts();
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            for (let i = 0; i < hearts.length; i++) {
                const heart = hearts[i];
                drawHeart(heart.points, heart.color, 1.5 + (i / 12));
                drawInitials(YOUR_INITIALS, heart.scale, centerX, centerY, heart.waveX, heart.waveY);
            }
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
